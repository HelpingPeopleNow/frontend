# frontend/.github/workflows/ci.yml
# NOTE: The frontend service is an independent git repo.
# The workspace root after checkout IS the frontend directory.
name: Frontend Service CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # Step 1: Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────────
  # Step 2: Type check
  # ──────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npm run typecheck

  # ──────────────────────────────────────────────
  # Step 3: Unit + integration + e2e tests
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build SPA (needed for Playwright preview)
        run: npm run build

      - name: Run vitest with coverage (unit + integration)
        run: npm run test:coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Check coverage thresholds
        if: always()
        run: |
          echo "Coverage thresholds are enforced by vitest config (vitest.config.ts)."
          echo "If tests passed, all thresholds (lines, branches, functions, statements) are met."

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-${{ github.sha }}
          path: coverage/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: frontend-coverage
          message: |
            ## Frontend Service Test Coverage

            | Metric | Threshold | Status |
            |--------|-----------|--------|
            | Lines | 75% | ${{ job.status == 'success' && '✅' || '❌' }} |
            | Branches | 75% | ${{ job.status == 'success' && '✅' || '❌' }} |
            | Functions | 78% | ${{ job.status == 'success' && '✅' || '❌' }} |
            | Statements | 75% | ${{ job.status == 'success' && '✅' || '❌' }} |

            [Full report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # ──────────────────────────────────────────────
  # Step 4: Build & Push Docker image
  # ──────────────────────────────────────────────
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
